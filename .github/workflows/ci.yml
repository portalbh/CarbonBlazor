name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CarbonBlazor.slnx

      - name: Build
        run: dotnet build CarbonBlazor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CarbonBlazor.slnx --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: TestResults
